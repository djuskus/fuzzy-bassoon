name: iOS Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - certs

jobs:
  build:
    name: Build & deploy to TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Precache Flutter iOS artifacts
        run: flutter precache --ios

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Flutter iOS
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 5
        run: flutter build ios --release --no-codesign

      - name: Run Fastlane
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 3
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          FASTLANE_XCODE_LIST_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}

      - name: Print Xcode build log
        if: always()
        run: |
          LOG=build/gym_logs/Runner-Runner.log
          if [ -f "$LOG" ]; then
            echo "=== Xcode build log ==="
            cat "$LOG"
          else
            echo "No gym log found at $LOG"
            find ~/Library/Logs/gym build -name "*.log" 2>/dev/null || echo "No logs found anywhere"
          fi
