name: iOS Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - certs

jobs:
  build:
    name: Build & deploy to TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Precache Flutter iOS artifacts
        run: flutter precache --ios

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: derived-data-

      - name: Configure Xcode project
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        run: flutter build ios --config-only --release

      - name: Run Fastlane
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 45
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          FASTLANE_XCODE_LIST_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: |
          # Stream gym log in real-time as Fastlane writes it
          LOG=build/gym_logs/Runner-Runner.log
          mkdir -p build/gym_logs
          ( while [ ! -f "$LOG" ]; do sleep 2; done; tail -f "$LOG" ) &
          TAIL_PID=$!

          bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}

          kill $TAIL_PID 2>/dev/null || true

      - name: Print full Xcode build log
        if: always()
        run: |
          LOG=build/gym_logs/Runner-Runner.log
          if [ -f "$LOG" ]; then
            echo "=== Full Xcode build log ==="
            cat "$LOG"
          else
            echo "No gym log found at $LOG"
            find ~/Library/Logs/gym build -name "*.log" 2>/dev/null || echo "No logs found anywhere"
          fi
